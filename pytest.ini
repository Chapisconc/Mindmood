# pytest.ini — Archivo de configuracion para el framework de pruebas pytest.
# Define las reglas de descubrimiento automatico de pruebas para el proyecto
# MindMood. Sin esta configuracion, pytest usaria sus valores por defecto
# que podrian no encontrar todas las pruebas del proyecto.
#
# Materia: SEMINARIO DE INGENIERIA DE SOFTWARE
# Alumno:  RAMIREZ RUIZ, CRISTOPHER SAID
# Seccion: D15 — CUCEI Guadalajara Jalisco

[pytest]
# testpaths: Directorios donde pytest buscara archivos de prueba.
# Al especificar solo "tests", pytest limita su busqueda a esta carpeta,
# ignorando otros directorios del proyecto (como ai_api/ o frontend/).
testpaths = tests

# python_files: Patron glob para identificar archivos que contienen pruebas.
# "test_*.py" indica que solo los archivos cuyo nombre comience con "test_"
# seran considerados como modulos de prueba (ej. test_mindmood.py).
python_files = test_*.py

# python_functions: Patron glob para identificar funciones de prueba dentro
# de los archivos. "test_*" reconoce toda funcion o metodo cuyo nombre
# inicie con "test_" como una prueba ejecutable.
python_functions = test_*

# python_classes: Patron glob para identificar clases que contienen pruebas.
# "Test*" indica que solo las clases cuyo nombre comience con "Test" seran
# consideradas como contenedores de metodos de prueba (ej. TestModular).
python_classes = Test*

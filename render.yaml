services:
  - type: web
    name: mindmood-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://mindmood.vercel.app,http://localhost:5173
      - key: PYTHON_VERSION
        value: 3.11.0

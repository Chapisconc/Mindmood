appId: com.mindmood.app
---
- launchApp
- tapOn: "Crear Cuenta"
- assertVisible: "Comienza a cuidar tu salud mental hoy"
- inputText: "test_user_" + randomString(5) + "@mindmood.com"
- tapOn: "Contraseña"
- inputText: "MindMood2026!"
- tapOn: "Confirmar Registro"
- assertVisible: "¡Cuenta Creada!"
- tapOn: "Ir al Login"
- assertVisible: "MindMood"
